name: plan-interactive-eforge-build-skill
description: Restructure the eforge build skill from a 3-step workflow to a
  5-step workflow with context inference, completeness assessment, conditional
  interview, and source preview confirmation
created: 2026-03-24
compiled: 2026-03-24
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-interactive-build-skill
    name: Interactive Build Skill Workflow
    depends_on: []
    branch: plan-interactive-eforge-build-skill/interactive-build-skill
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: lenient
profile:
  extends: errand
  description: Small, self-contained changes. Single file or a few lines. Low
    risk, no architectural impact.
  compile:
    - prd-passthrough
