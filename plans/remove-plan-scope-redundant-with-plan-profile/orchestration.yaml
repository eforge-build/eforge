name: remove-plan-scope-redundant-with-plan-profile
description: Remove redundant plan:scope event and replace complete-scope
  early-exit with plan:skip event
created: 2026-03-18
compiled: 2026-03-18
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-remove-scope-add-skip
    name: Remove plan:scope Event and Add plan:skip Event
    depends_on: []
    branch: remove-plan-scope-redundant-with-plan-profile/remove-scope-add-skip
profile:
  description: Multi-file feature work or refactors that need planning and review
    but fit in a single plan. Use for medium-complexity tasks with cross-file
    changes.
  compile:
    - planner
    - plan-review-cycle
  build:
    - - implement
      - doc-update
    - review
    - review-fix
    - evaluate
  agents: {}
  review:
    strategy: auto
    perspectives:
      - code
    maxRounds: 1
    evaluatorStrictness: standard
