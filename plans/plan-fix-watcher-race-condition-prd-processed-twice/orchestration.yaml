name: plan-fix-watcher-race-condition-prd-processed-twice
description: Fix race condition where two watcher processes both pick up the
  same PRD within milliseconds, causing duplicate monitor sidebar entries. Adds
  lockfile-based atomic claim to prd-queue.ts and integrates into runQueue().
created: 2026-03-24
compiled: 2026-03-24
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-lockfile-claim
    name: Lockfile-based PRD claim to prevent duplicate processing
    depends_on: []
    branch: plan-fix-watcher-race-condition-prd-processed-twice/lockfile-claim
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: errand
  description: Small, self-contained changes. Single file or a few lines. Low
    risk, no architectural impact.
  compile:
    - prd-passthrough
