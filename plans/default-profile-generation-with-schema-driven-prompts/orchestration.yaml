name: default-profile-generation-with-schema-driven-prompts
description: Make profile generation the default behavior with schema-driven
  prompts and named profiles
created: 2026-03-18
compiled: 2026-03-18
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test -- test/dynamic-profile-generation.test.ts
  - pnpm build
plans:
  - id: plan-01-schema-driven-prompts
    name: Schema-Driven Profile Prompts and Named Profiles
    depends_on: []
    branch: default-profile-generation-with-schema-driven-prompts/schema-driven-prompts
  - id: plan-02-default-cli-flag
    name: Flip CLI Default to Generate Profiles
    depends_on:
      - plan-01-schema-driven-prompts
    branch: default-profile-generation-with-schema-driven-prompts/default-cli-flag
profile:
  description: Multi-file feature work or refactors that need planning and review
    but fit in a single plan. Use for medium-complexity tasks with cross-file
    changes.
  compile:
    - planner
    - plan-review-cycle
  build:
    - - implement
      - doc-update
    - review
    - review-fix
    - evaluate
  agents: {}
  review:
    strategy: auto
    perspectives:
      - code
    maxRounds: 1
    evaluatorStrictness: standard
