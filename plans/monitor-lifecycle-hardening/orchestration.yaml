name: monitor-lifecycle-hardening
description: Decouple event recording from web server, replace idle timeout with
  countdown shutdown plus browser keep-alive, extract signalMonitorShutdown
created: 2026-03-18
compiled: 2026-03-18
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-lifecycle-hardening
    name: Monitor Lifecycle Hardening
    depends_on: []
    branch: monitor-lifecycle-hardening/lifecycle-hardening
profile:
  description: Multi-file feature work or refactors that need planning and review
    but fit in a single plan. Use for medium-complexity tasks with cross-file
    changes.
  compile:
    - planner
    - plan-review-cycle
  build:
    - - implement
      - doc-update
    - review
    - review-fix
    - evaluate
  agents: {}
  review:
    strategy: auto
    perspectives:
      - code
    maxRounds: 1
    evaluatorStrictness: standard
