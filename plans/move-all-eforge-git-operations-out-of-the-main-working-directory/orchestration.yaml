name: move-all-eforge-git-operations-out-of-the-main-working-directory
description: Move all eforge git operations out of the main working directory
  into worktrees so the user's branch is never switched mid-build
created: 2026-03-28
compiled: 2026-03-28
mode: engine-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-worktree-isolation
    name: Move all git operations to worktrees
    depends_on: []
    branch: move-all-eforge-git-operations-out-of-the-main-working-directory/worktree-isolation
    build:
      - implement
      - review-cycle
      - test-cycle
    review:
      strategy: parallel
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: strict
profile:
  extends: excursion
  description: "Multi-file feature work or refactors. Use when changes touch many
    files but are tightly coupled - e.g., type signature changes that cascade to
    consumers, interface refactors, rename-and-update-all-callers. The key test:
    can every piece pass type-check independently? If not, use excursion."
  compile:
    - planner
    - plan-review-cycle
