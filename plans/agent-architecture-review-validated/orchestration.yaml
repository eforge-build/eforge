name: agent-architecture-review-validated
description: Consolidate plan-evaluator and cohesion-evaluator into a single
  parameterized runner, and relocate parseEvaluationBlock to common.ts
created: 2026-03-19
compiled: 2026-03-19
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-consolidate-evaluators
    name: Consolidate Evaluators and Relocate Parser
    depends_on: []
    branch: agent-architecture-review-validated/consolidate-evaluators
profile:
  description: Multi-file feature work or refactors that need planning and review
    but fit in a single plan. Use for medium-complexity tasks with cross-file
    changes.
  compile:
    - planner
    - plan-review-cycle
  build:
    - - implement
      - doc-update
    - review
    - review-fix
    - evaluate
  agents: {}
  review:
    strategy: auto
    perspectives:
      - code
    maxRounds: 1
    evaluatorStrictness: strict
