name: fix-planner-stage-ignoring-pipeline-composer-s-prd-passthrough-selection
description: Fix planner stage ignoring pipeline-composer's prd-passthrough
  selection by adding an early-return guard and resetting the compile loop index
created: 2026-04-04
compiled: 2026-04-04
mode: errand
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-planner-guard-and-loop-reset
    name: Planner Guard and Compile Loop Reset
    depends_on: []
    branch: fix-planner-stage-ignoring-pipeline-composer-s-prd-passthrough-selection/planner-guard-and-loop-reset
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a focused bug fix in the core pipeline orchestration logic,
    clearly excursion scope - it touches multiple files across the engine
    (pipeline.ts planner stage, runCompilePipeline loop) and requires new test
    coverage. Standard planner + plan-review-cycle for compile since the PRD is
    detailed but the implementation needs decomposition into the guard logic,
    the loop index reset, and test creation. Build uses implement followed by
    review-cycle and test-write in parallel - review-cycle is warranted because
    changes to the pipeline execution loop are correctness-critical (a subtle
    off-by-one or missed edge case could break other pipeline compositions), and
    test-write runs alongside it since the acceptance criteria explicitly
    require a test for the composer-to-passthrough path. Single correctness
    perspective with 2 rounds and standard strictness matches the risk profile:
    important engine logic but not security/data sensitive. Post-merge
    validation (pnpm test) covers regression checks."
