name: hardening-10-plugin-and-pi-skill-parity
description: Bring the Claude Code plugin to parity with the Pi extension by
  porting the `eforge-plan` skill into the plugin, aligning paired-skill
  narrative across `eforge-plugin/skills/` and `packages/pi-eforge/skills/`, and
  adding a parity-check script that keeps them in sync going forward.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm docs:check-parity
  - pnpm test
plans:
  - id: plan-01-plan-skill-and-parity-script
    name: Port plan skill to plugin and add parity-check script
    depends_on: []
    branch: hardening-10-plugin-and-pi-skill-parity/plan-skill-and-parity-script
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - general
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
  - id: plan-02-narrative-alignment
    name: Align paired-skill narrative across plugin and Pi
    depends_on:
      - plan-01-plan-skill-and-parity-script
    branch: hardening-10-plugin-and-pi-skill-parity/narrative-alignment
    build: *a1
    review: *a2
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a classic excursion: it touches multiple files across
    two consumer packages (eforge-plugin/ and packages/pi-eforge/) plus a new
    parity-check script, but a single planner session can readily enumerate all
    skill pairs, the new plan skill port, the script, the version bump, and
    README updates. There are no 4+ independent subsystems requiring delegated
    module planning, and changes are tightly coupled by the parity goal
    (negative expedition signal). Compile uses planner + plan-review-cycle since
    correctly enumerating every skill pair and catching any missed file matters
    for acceptance criteria. The build pipeline runs implement first, then
    review-cycle in parallel with doc-update since the PRD explicitly calls out
    updating the plugin README/MCP-tool registry docs if they enumerate skills.
    Standard strictness with 2 review rounds is appropriate: this is
    documentation/tooling parity work, not security or data-sensitive, but
    narrative drift detection warrants careful review. Single-perspective review
    suffices since there's no specialized security/performance/API concern."
