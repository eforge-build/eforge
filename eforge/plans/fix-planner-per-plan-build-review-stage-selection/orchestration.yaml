name: fix-planner-per-plan-build-review-stage-selection
description: Allow the planner agent to choose per-plan build stages and review
  config by extending orchestrationPlanSchema with optional build/review fields
  and passing them through writePlanSet, so different plans can show different
  pipeline breadcrumbs in the monitor UI instead of all sharing the composer's
  defaults.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-planner-per-plan-build-review
    name: Pass per-plan build/review through planner submission
    depends_on: []
    branch: fix-planner-per-plan-build-review-stage-selection/planner-per-plan-build-review
    build: &a1
      - implement
      - - review-cycle
        - test-write
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - schema-consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a focused, well-scoped excursion: the PRD targets two engine
    files (schemas.ts, plan.ts) plus one new test, with explicit line-level
    guidance. A single planner session can easily enumerate the changes and
    ordering, so excursion (not expedition) is correct, and no errand because we
    still want a real review gate on schema/wiring changes that affect the
    planner contract. Compile uses planner + plan-review-cycle to catch any
    scope drift (e.g. accidentally touching the explicitly-out-of-scope
    planner.md or planner.ts) before build. defaultBuild leads with implement,
    then runs review-cycle in parallel with test-write (the PRD calls out a
    specific new round-trip test) and doc-update (to refresh the stale comment
    narrative and any related developer docs); test-write and doc-update both
    declare only implement as a predecessor, so the parallel group is valid.
    Review strategy is single with two perspectives (correctness for the
    schema/round-trip wiring, schema-consistency for the Zod + YAML
    serialization path) at standard strictness with maxRounds 2, since the
    change is small but touches a contract surface that the planner agent
    depends on."
