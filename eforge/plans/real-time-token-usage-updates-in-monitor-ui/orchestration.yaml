name: real-time-token-usage-updates-in-monitor-ui
description: Add per-turn agent:usage events to surface live token metrics in
  the monitor dashboard
created: 2026-03-31
compiled: 2026-03-31
mode: incremental-event-plumbing
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-agent-usage-event
    name: Real-time Agent Usage Events and Monitor Integration
    depends_on: []
    branch: real-time-token-usage-updates-in-monitor-ui/agent-usage-event
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
