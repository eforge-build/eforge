name: squash-single-plan-build-commits-into-one-clean-commit-on-main
description: Squash single-plan build commits into one clean commit on main by
  using git merge --squash in the finalize phase
created: 2026-03-30
compiled: 2026-03-30
mode: targeted-refactor
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-squash-finalize
    name: Squash single-plan build commits into one clean commit on main
    depends_on: []
    branch: squash-single-plan-build-commits-into-one-clean-commit-on-main/squash-finalize
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
