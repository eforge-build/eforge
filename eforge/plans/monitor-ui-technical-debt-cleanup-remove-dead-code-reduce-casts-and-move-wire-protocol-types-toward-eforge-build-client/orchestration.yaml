name: monitor-ui-technical-debt-cleanup-remove-dead-code-reduce-casts-and-move-wire-protocol-types-toward-eforge-build-client
description: Move monitor UI wire-protocol type ownership to
  @eforge-build/client, drop the direct engine dependency from monitor UI, fix
  sidecar verdict casts, populate plan-frontmatter migrations via real YAML
  parsing, and remove confirmed-unused API helpers.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm --filter @eforge-build/monitor-ui test
  - pnpm --filter @eforge-build/monitor-ui build
  - pnpm test
plans:
  - id: plan-01-monitor-ui-debt-cleanup
    name: "Monitor UI debt cleanup: client-owned wire types, dead code removal, cast
      and frontmatter fixes"
    depends_on: []
    branch: monitor-ui-technical-debt-cleanup-remove-dead-code-reduce-casts-and-move-wire-protocol-types-toward-eforge-build-client/cleanup
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - - implement
      - doc-author
    - doc-sync
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - architecture
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a bounded technical-debt cleanup that touches three packages
    (client, engine, monitor-ui) but is mostly mechanical type/export/import
    work plus localized fixes (YAML parsing, dead code removal, recovery sidecar
    cast cleanup). The PRD itself suggests the 'errand' profile, but the work
    spans multiple packages with a non-trivial package-boundary refactor (moving
    wire protocol type ownership, potentially adding a browser-safe client
    subpath, updating package.json/tsconfig, adding guard tests), which is the
    canonical excursion shape - not a trivial single-file errand. It is clearly
    not expedition: there is one coherent refactor with sequential dependencies
    (add types in client -> switch monitor UI imports -> drop engine dep -> add
    guard test), no 4+ independent subsystems, and a single planner session can
    easily enumerate every file change. compile uses planner + plan-review-cycle
    because the cross-package boundary work and the 'document a precise deferred
    follow-up if a browser subpath cannot be completed safely' escape hatch in
    acceptance criteria #2 benefit from a plan quality gate to pin down scope
    before build. defaultBuild runs implement in parallel with doc-author (the
    PRD touches package boundaries and the @eforge-build/client public surface,
    which warrants authored docs/notes for the new browser-safe subpath), then
    doc-sync to catch references to monitor UI's old engine event imports across
    docs, then review-cycle since this is architectural cleanup where it's easy
    to miss a stray import or break the engine-internal callers. Review uses
    correctness (the engine-import guard, YAML migration parsing, removed
    exports must not break callers) plus architecture (the
    client/engine/monitor-ui package boundary is the central concern). Standard
    strictness and 2 rounds are appropriate for refactor-focused cleanup with a
    clear acceptance checklist."
