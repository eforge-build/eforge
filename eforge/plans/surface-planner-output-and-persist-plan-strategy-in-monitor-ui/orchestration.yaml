name: surface-planner-output-and-persist-plan-strategy-in-monitor-ui
description: Make per-plan build/review configs durable in the planning:complete
  event so they survive worktree cleanup, and add a dedicated Plan tab in the
  monitor UI exposing classification, rationale, pipeline, and per-plan
  strategy.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-surface-planner-output
    name: Surface planner output and persist plan strategy
    depends_on: []
    branch: surface-planner-output-and-persist-plan-strategy-in-monitor-ui/main
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a coordinated excursion, not an expedition. It touches
    multiple packages (engine events, monitor server, monitor UI) but the work
    is a single dependency chain: extend the planning:complete event payload
    (events.ts) → populate it from two producers (planner.ts, compile-stages.ts)
    → consume it in the server (serveOrchestration) → consume it in the UI (new
    Plan tab in ConsolePanel + app.tsx wiring). A single planner session can
    enumerate every plan, file, and contract here; this is exactly the
    type/interface-extension shape the guidelines flag as a negative expedition
    signal (changing the event schema ripples through every consumer). It is
    also clearly more than an errand because it spans engine + server + UI, adds
    a new UI surface, and has a graceful-degradation requirement for old
    sessions. Compile uses planner + plan-review-cycle because plan quality
    matters: the event-schema change is the foundation everything else builds
    on, and a sloppy plan that misses a producer (e.g. forgets compile-stages.ts
    or the server fallback) would cause silent regressions like the one the PRD
    is fixing. Build uses implement followed by review-cycle (max 2 rounds) -
    implement does the cross-package edit, then a single review-cycle catches
    consistency issues across the event payload, server fallback, and UI
    rendering, with the evaluator gating fixes. No test-write/test stages: per
    AGENTS.md, engine orchestration, server I/O, and UI components are
    integration-level and not the target of unit tests; the PRD's acceptance
    criteria are manual monitor-UI verification across
    errand/excursion/expedition runs and a SQLite spot-check, not new vitest
    coverage. No doc-update: the PRD does not change README/AGENTS-level user
    docs. Review strategy is single with correctness + consistency perspectives
    at standard strictness - appropriate for a feature that is medium-risk
    (event schema + UI), not security/data-sensitive."
