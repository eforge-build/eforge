name: surface-tiers-within-eforge-config
description: Update /eforge:config skill bodies (Claude Code plugin + Pi
  extension) to surface agent tiers as a first-class config dimension and fix
  stale resolution-chain and role-default narratives.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
plans:
  - id: plan-01-tier-aware-config-skill
    name: Tier-aware /eforge:config skill bodies
    depends_on: []
    branch: surface-tiers-within-eforge-config/tier-aware-config-skill
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - technical-writing
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This PRD is a documentation-only update to two skill files plus a
    plugin version bump. It spans multiple files with parity requirements
    between them, so it's beyond an errand but well within excursion scope - a
    single planner session can easily enumerate all edits. No code changes, no
    tests, and no API surface changes mean test-write/test and doc-update stages
    aren't needed (the change *is* documentation). plan-review-cycle is included
    because parity between the two SKILL.md files and accuracy against the
    source-of-truth (`AGENT_ROLE_TIERS`, resolution chain) are explicit
    acceptance criteria - a quality gate on the plan helps catch drift before
    build. review-cycle on the build side ensures the resulting copy is
    consistent across both files and faithfully reflects the resolution chain. A
    single technical-writing perspective with standard strictness fits prose
    edits; maxRounds=2 is sufficient for copy review without over-iterating.
