name: decouple-failed-prd-discovery-from-session-state
description: Decouple failed-PRD discovery and recovery-sidecar access from
  session/run state by removing the dead-weight `setName` parameter from
  read-sidecar and apply-recovery surfaces (HTTP, MCP, CLI, engine, UI) and
  routing the /eforge:recover workflow's failed-PRD discovery to
  `eforge_queue_list` instead of `eforge_status`.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
  - node scripts/check-skill-parity.mjs
plans:
  - id: plan-01-decouple-failed-prd-discovery
    name: Decouple failed-PRD discovery from session state
    depends_on: []
    branch: decouple-failed-prd-discovery-from-session-state/main
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
      maxRounds: 1
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Coordinated breaking change across 17 files spanning HTTP routes,
          client helpers, MCP tools (Claude + Pi), CLI, engine signature, event
          payload, monitor UI, slash-command workflows, and tests. Requires
          careful tracking of all setName removal sites without leaving dead
          references.
      reviewer:
        effort: high
        rationale: API contract change with cross-package implications
          (DAEMON_API_VERSION bump). Reviewer must verify no setName references
          remain on the dropped surfaces and that the kept surfaces
          (engine.recover, /api/recover, eforge_recover) are unchanged.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
    - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - api-contract
      - consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a cross-cutting refactor that touches many files but follows
    a clear, sequential dependency chain: shared HTTP types and
    DAEMON_API_VERSION must change first, then the daemon routes, then client
    helpers, then MCP tools (both Claude Code and Pi mirrors), CLI, engine
    signature, monitor UI, and slash-command/skill docs - plus tests. A single
    planner session can enumerate all of these plans and their cross-plan
    dependencies (it's a rename-and-update-all-callers shape, which the
    guidelines explicitly flag as a negative expedition signal), so excursion is
    the right scope. plan-review-cycle is included because the PRD has 9
    acceptance criteria spanning HTTP/MCP/CLI/engine/UI/skills with strict
    parity requirements (Claude Code <-> Pi, no backward-compat shims,
    DAEMON_API_VERSION bump) - a quality gate on the plan catches missed
    surfaces (e.g. forgetting the Pi mirror or the dedup-cache key collapse)
    before build. The build pipeline runs implement first, then review-cycle in
    parallel with doc-update (doc-update declares only implement as a
    predecessor, so it's safe in the parallel group; the PRD explicitly calls
    out updating recover.md and the Pi skill, making doc-update load-bearing),
    followed by test-write since the PRD's AC #8 mandates new vitest cases for
    the new contract (apiReadRecoverySidecar prdId-only round-trip,
    engine.applyRecovery(prdId), eforge_status surfacing failed PRDs, and the
    queue-section component with empty runs). test-write must be sequential
    after implement per its predecessor declaration. Review uses 'single'
    strategy with correctness/api-contract/consistency perspectives because the
    risk shape here is API-contract drift (matching signatures across
    HTTP/MCP/CLI/engine and Claude Code <-> Pi parity) rather than security or
    data integrity; standard strictness with maxRounds=2 is sufficient for a
    refactor of this size."
