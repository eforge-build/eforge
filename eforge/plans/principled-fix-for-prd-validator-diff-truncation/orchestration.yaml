name: principled-fix-for-prd-validator-diff-truncation
description: Replace the 80K-byte global slice of the PRD validator's git diff
  input with a per-file, individually-budgeted structure so alphabetically-early
  large files cannot silently hide implementation code from the validator.
created: 2026-04-13
compiled: 2026-04-13
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-per-file-diff
    name: Per-file budgeted PRD validator diff
    depends_on: []
    branch: principled-fix-for-prd-validator-diff-truncation/per-file-diff
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - - test-write
      - doc-update
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - testing
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a focused, well-scoped refactor: extract
    diff-construction logic into a new file (`prd-validator-diff.ts`), swap the
    call site in `eforge.ts`, and add unit tests. It touches a handful of files
    in one package with clear contracts and acceptance criteria — classic
    excursion scope, not errand (it introduces a new module with a typed API and
    multiple test cases) and not expedition (no independent subsystems). Compile
    uses `planner` plus `plan-review-cycle` because the PRD specifies precise
    interfaces (`BuildPrdDiffOptions`, `BuildPrdDiffResult`, default budgets,
    `-z` flag usage, `maxBuffer` size) that a plan review should verify are
    preserved before build. Build starts with `implement`, then `review-cycle`
    to catch correctness issues in the git-diff parsing and budgeting logic
    (NUL-delimited parsing, binary `-\t-` detection, and per-file budget
    decisions are subtle and easy to get wrong). `test-write` runs in parallel
    with `doc-update` after review: the acceptance criteria explicitly require
    five specific unit test cases against a programmatically-built scratch git
    repo including a regression test for the alphabetical-ordering bug, and the
    PRD changes tracing span fields (`totalBytes`, `summarizedCount`) that may
    warrant a doc note. Review config uses `single` strategy with `correctness`
    and `testing` perspectives — correctness catches the git-plumbing bugs,
    testing ensures the programmatic fixture approach and all six acceptance
    test scenarios are covered. `standard` strictness fits a refactor with no
    security/data-integrity surface, and 2 rounds is enough for a bounded-scope
    change."
