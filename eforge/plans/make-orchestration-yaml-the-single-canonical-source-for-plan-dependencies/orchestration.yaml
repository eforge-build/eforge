name: make-orchestration-yaml-the-single-canonical-source-for-plan-dependencies
description: Make orchestration.yaml the single canonical source of plan
  dependsOn. Drop depends_on from plan-file frontmatter; rewrite the
  compile-stage interceptor to authoritatively populate PlanFile.dependsOn from
  orchestration config; delete backfillDependsOn band-aid.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-canonicalize-orch-deps
    name: Canonicalize plan deps in orchestration.yaml
    depends_on: []
    branch: make-orchestration-yaml-the-single-canonical-source-for-plan-dependencies/canonicalize-orch-deps
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a focused refactor with a clear, well-scoped change list
    across a small set of engine files (schemas, plan, compiler, compile-stages,
    misc) plus targeted test updates. A single planner session can easily
    enumerate all plans, file changes, and dependencies (the PRD already does
    most of this work), so excursion is the right scope - not expedition. The
    change has cross-cutting impact (schema, writers, readers, interceptor,
    tests must all stay consistent), so plan-review-cycle adds a quality gate to
    catch any missed touch-points (e.g. forgotten readers/writers or fixture
    drift) before build. For build, implement is followed by a parallel group of
    review-cycle (correctness of the schema/writer/reader/interceptor changes
    and test coverage of the authoritative override) and doc-update (since
    PlanFile.dependsOn semantics change from 'parsed from frontmatter' to
    'resolved from orchestration.yaml' - any inline docs/comments referencing
    the old behavior need updating). doc-update parallelizes safely because it
    only declares implement as a predecessor. Review uses a single strategy with
    correctness + consistency perspectives at standard strictness and 2 rounds:
    the change is structural but mechanical, with the regression-guard test from
    Acceptance Criterion 3 providing strong objective verification - no need for
    parallel security/perf perspectives or strict gating."
