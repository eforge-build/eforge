name: fix-parallel-prd-builds-mixing-events-in-monitor-ui
description: Fix event stream isolation for parallel PRD builds so each build's
  events carry the correct runId and sessionId without cross-contamination in
  the monitor UI
created: 2026-04-01
compiled: 2026-04-01
mode: parallel-event-isolation-fix
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-fix-event-isolation
    name: Fix parallel PRD event isolation
    depends_on: []
    branch: fix-parallel-prd-builds-mixing-events-in-monitor-ui/fix-event-isolation
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
profile:
  extends: excursion
  description: Multi-file feature work or refactors. Use when the full scope can
    be planned in a single planner session - all plans enumerated, all file
    changes listed, and cross-plan dependencies resolved. Covers tightly coupled
    changes (type cascades, interface refactors, rename-and-update-all-callers)
    and any work where one planning pass is sufficient.
  compile:
    - planner
    - plan-review-cycle
