name: hardening-07-mcp-tool-factory-shared-cli-runordelegate-helper
description: Introduce a createDaemonTool factory for all 11 MCP tools in
  packages/eforge/src/cli/mcp-proxy.ts, a runOrDelegate CLI helper used by
  `build` and `queue run`, and a centralized error formatter shared between the
  MCP and CLI surfaces.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-factory-and-run-or-delegate
    name: MCP tool factory + runOrDelegate helper + shared error formatting
    depends_on: []
    branch: hardening-07-mcp-tool-factory-shared-cli-runordelegate-helper/factory-and-run-or-delegate
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - maintainability
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a focused refactor of the MCP proxy and CLI in a single
    package (`packages/eforge`), introducing a `createDaemonTool` factory, a
    `runOrDelegate` helper, and centralized error formatting. It touches
    multiple files (mcp-proxy.ts, index.ts, new run-or-delegate.ts and
    errors.ts, plus a new test) but all within one subsystem with a clear
    sequential dependency - this is a textbook excursion, not an expedition (no
    4+ independent subsystems, and all 11 tool migrations are tightly coupled to
    the factory shape). Compile uses planner + plan-review-cycle because the
    refactor has many touch points (11 tools, 2 CLI commands, shared error
    surface) and plan quality matters to avoid missing migrations or breaking
    tool behavior. Build uses implement followed by review-cycle in parallel
    with doc-update: the change is mostly internal, but the PRD explicitly calls
    out the CLI and MCP consumer-facing behavior must remain identical, so
    review-cycle with maxRounds=2 provides a quality gate. doc-update runs in
    parallel with review-cycle (both only depend on implement) to keep
    AGENTS.md/README guidance in sync if needed. test-write is omitted because
    the PRD already specifies the exact test file required
    (`test/mcp-tool-factory.test.ts`) - the implement stage will produce it
    directly per acceptance criteria. Review uses single strategy with
    correctness + maintainability perspectives at standard strictness: this is a
    refactor with behavioral-equivalence requirements (not security/data
    sensitive), so strict is overkill but quality gating is warranted."
