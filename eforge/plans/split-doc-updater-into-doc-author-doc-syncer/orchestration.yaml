name: split-doc-updater-into-doc-author-doc-syncer
description: "Replace the single doc-updater agent with two purpose-built
  agents: doc-author (plan-driven authoring, can create new docs, runs parallel
  with implement) and doc-syncer (diff-driven sync of existing docs against
  post-implement diff, runs sequentially after implement). Each new build stage
  owns its own commit so doc work is never lost or blended into a later stage's
  diff."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-doc-author-syncer-split
    name: Split doc-updater into doc-author and doc-syncer
    depends_on: []
    branch: split-doc-updater-into-doc-author-doc-syncer/main
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: "Coordinated refactor across ~30 files: type-union changes in
          events.ts/config.ts/schemas.ts that ripple into
          pipeline/agent-config.ts, build-stages.ts, two new agent runners, two
          new prompts, three planner-coaching prompts, CLI/monitor-UI consumers,
          plugin/skill docs, plus rename+expand of the wiring test. Type-check
          spans the full monorepo, so all consumers must land together. High
          effort gives the builder room to author two new prompts and
          methodically update every typed consumer in one pass."
      reviewer:
        effort: high
        rationale: The change touches the AgentRole union and the EforgeEvent union —
          both are exhaustively switched on in display.ts and reducer.ts. A
          high-effort review is needed to catch any missed switch arm, stale
          doc-update reference, or drift between the two new agents (parsing-tag
          mismatch, predecessor-rule violation, missing stage-level commit).
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - doc-update
    - review-cycle
  defaultReview:
    strategy: auto
    perspectives:
      - correctness
      - consistency
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "This is a coordinated refactor that splits one agent (`doc-updater`)
    into two (`doc-author` + `doc-syncer`) and threads the change through
    agents, prompts, build stages, the `AgentRole` union, schemas, config tier
    mappings, planner/module-planner/pipeline-composer prompts, CLI display,
    monitor UI reducer + pipeline component, tests, and consumer-facing skill
    docs in both `eforge-plugin/` and `packages/pi-eforge/`. Although it touches
    many files, it is fundamentally one logically cohesive change with a shared
    type contract (`AgentRole`) that propagates everywhere - not 4+ independent
    subsystems - so excursion is the right scope; expedition's delegated module
    planning would manufacture coordination overhead without payoff. A single
    planner session can enumerate every file in the PRD's already-itemized
    scope, so no architecture/module planning is needed. `plan-review-cycle` is
    included specifically because the motivating failure was a PRD-validator
    complaint about missing scope coverage; a plan review pass catches the same
    class of issue (e.g., forgetting to update one of the two consumer packages,
    missing an event-type rename, leaving a stale `doc-updater` reference)
    before build. Build stages run sequentially: `implement` first (since
    `doc-update` declares `implement` as a predecessor and cannot share its
    parallel group), then `doc-update` to keep adjacent unlisted docs (skill
    docs, READMEs, roadmap) in sync with the renamed agents - the PRD itself
    flags consumer-doc edits as critical - then `review-cycle`. `review-cycle`
    is essential here because `AgentRole` union changes plus event-type renames
    are the kind of refactor where one missed `case` arm or one forgotten
    `'doc-updater'` literal silently breaks the pipeline; iterative review
    catches those across two rounds. `standard` strictness with `correctness` +
    `consistency` perspectives matches the risk profile: this is
    type-system-anchored refactoring (correctness gate) that must keep
    `eforge-plugin/` and `packages/pi-eforge/` in lockstep (consistency gate),
    but it is not security- or data-critical, so `strict` would over-rotate."
