name: structured-plan-review-fix-submissions-to-prevent-yaml-corruption
description: Route plan-reviewer, cohesion-reviewer, and architecture-reviewer
  fixes through Zod-validated submission tools and apply them via stringifyYaml
  so reviewer agents can no longer corrupt orchestration.yaml or plan-file
  frontmatter by hand-writing YAML.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-structured-plan-review-fixes
    name: Structured plan-review fix submissions
    depends_on: []
    branch: structured-plan-review-fix-submissions-to-prevent-yaml-corruption/main
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - api-design
    maxRounds: 2
    evaluatorStrictness: standard
  rationale: "This PRD is a focused refactor across a well-bounded set of files in
    a single subsystem (engine reviewer agents, their prompts, plan.ts helpers,
    schemas, and one new test file). A single planner session can easily
    enumerate all plans, file changes, and the sequential dependency between
    schema/helper additions and the agent/prompt wiring, so excursion is the
    correct scope (not expedition). I include plan-review-cycle in compile
    because the PRD's whole point is to harden plan-review correctness;
    validating the generated plans through that same cycle exercises the path
    being changed and adds a meaningful quality gate. For build, the pipeline is
    sequential: implement first, then review-cycle. doc-update is intentionally
    omitted because the PRD touches internal engine code, schemas, agent wiring,
    and prompt files - none of which are user-facing documentation. review-cycle
    with maxRounds=2 and standard strictness fits a correctness-sensitive
    refactor with clear acceptance criteria (type-check, build, tests,
    round-trip assertion on a description containing ': '). Perspectives focus
    on correctness (YAML round-trip, discriminated-union schemas, frontmatter
    preservation) and api-design (new public helpers in plan.ts and
    schemas.ts)."
