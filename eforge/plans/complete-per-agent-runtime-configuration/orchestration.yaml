name: complete-per-agent-runtime-configuration
description: "Finish plan-04 remainder and land all of plan-05 from the original
  per-agent-runtime-configuration PRD: source fix, test fixture migration,
  plan-load validation, monitor-UI session rename, profile directory + loader +
  MCP tool rename, slash command + plugin + init-skill rename, HTTP route +
  client rename + DAEMON_API_VERSION bump, docs sweep."
base_branch: eforge/per-agent-runtime-configuration-harness-model
mode: excursion
validate:
  - pnpm build
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-finish-plan-04
    name: "Finish Plan-04: Source Fix, Test Fixture Migration, New Tests, Plan-Load
      Validation"
    depends_on: []
    branch: complete-per-agent-runtime-configuration/finish-plan-04
    agents:
      builder:
        effort: xhigh
        rationale: Large mechanical fixture migration across 25+ files plus 3 new tests
          plus plan-load validation. Fails fast without the AgentTerminalError
          source fix landing alongside. One-shot scope is broad; high reasoning
          keeps the builder from drifting during the repetitive fixture pass.
      reviewer:
        effort: high
        rationale: "Must verify no backend: 'claude-sdk' | 'pi' remnants and that the
          new tests actually assert rejection semantics + plan-load validation."
    build: &a1
      - implement
      - review-cycle
      - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
  - id: plan-02-monitor-ui-session-rename
    name: Monitor-UI Session Backend to Harness Rename
    depends_on:
      - plan-01-finish-plan-04
    branch: complete-per-agent-runtime-configuration/monitor-ui-session-rename
    build: *a1
    review: *a2
  - id: plan-03-profile-loader-mcp
    name: Profile Directory and Loader Rename + MCP Tool Rename
    depends_on:
      - plan-02-monitor-ui-session-rename
    branch: complete-per-agent-runtime-configuration/profile-loader-mcp
    agents:
      builder:
        effort: xhigh
        rationale: Directory rename + loader function renames + auto-migration logic +
          two MCP tool registrations. Tightly coupled - loader consumers are the
          MCP tools. Deep reasoning needed to design the auto-migration path
          correctly (idempotent, safe under git, handles both-directories-exist
          case).
      reviewer:
        effort: high
        rationale: Auto-migration logic has edge cases (git-tracked directory,
          both-exist warning, marker file rename). Must verify all callers of
          the renamed loader functions updated.
    build: *a1
    review: *a2
  - id: plan-04-slash-skills-plugin
    name: Slash Command Rename + Init Skill Update + Plugin Version Bump
    depends_on:
      - plan-03-profile-loader-mcp
    branch: complete-per-agent-runtime-configuration/slash-skills-plugin
    agents:
      builder:
        effort: high
        rationale: Cross-surface parity (Claude Code plugin + Pi skill) with the parity
          checker enforcing sync. Includes skill file rewrites to use the new
          agentRuntimes shape in init scaffolding.
    build: *a1
    review: *a2
  - id: plan-05-http-route-client
    name: HTTP Route Rename + Client Helpers + DAEMON_API_VERSION Bump
    depends_on:
      - plan-04-slash-skills-plugin
    branch: complete-per-agent-runtime-configuration/http-route-client
    agents:
      builder:
        effort: high
        rationale: Breaking HTTP contract change touching server, route registry, shared
          client helpers, and all callers. Must update `API_ROUTES` keys, rename
          client helpers, and bump DAEMON_API_VERSION in lockstep.
      reviewer:
        effort: high
        rationale: Breaking wire-protocol change. Reviewer must confirm no `/backends`
          path literal leaks, all `API_ROUTES.backend*` keys renamed, version
          bumped from 5 to 6, and all callers (monitor-ui, CLI, Pi extension)
          updated.
    build: *a1
    review: *a2
  - id: plan-06-docs-sweep
    name: Documentation Terminology Sweep
    depends_on:
      - plan-05-http-route-client
    branch: complete-per-agent-runtime-configuration/docs-sweep
    build: *a1
    review: *a2
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is an excursion, not an expedition. The PRD is large in surface
    area but the work is a sequential rename/finish-the-job effort with tight
    cross-cutting dependencies (test-fixture migration, profile rename touching
    loader+MCP+slash+HTTP+docs in lockstep, DAEMON_API_VERSION bump). These are
    precisely the negative expedition signals called out:
    rename-and-update-all-callers refactors and shared-contract changes (HTTP
    route + client) that fan out to consumers. A single planner session can
    enumerate the ~7 plans the PRD itself prescribes in its 'Implementation
    order' section, so delegated module planning would add overhead without
    benefit. Compile stages: planner + plan-review-cycle, because the PRD
    explicitly warns the prior build hit the continuation wall on plan-04 and
    asks the planner to produce bounded plans aligned with its 7-step order; a
    plan review gate catches scope creep before build. Build stages: implement
    -> review-cycle -> doc-update. review-cycle is sequential after implement
    (it declares implement as predecessor and conflicts with review). doc-update
    runs last sequentially because several plans (B5/B6) ARE the docs/version
    bump and benefit from reviewer-validated state; keeping it sequential avoids
    racing on the same plan files. No test-write stage: the PRD has explicit,
    hand-specified new tests (A3) that the builder writes directly per plan, and
    the bulk of test work is fixture migration, not generation. Review config:
    single strategy with correctness + consistency perspectives matches the risk
    profile (mechanical renames + breaking HTTP version bump + 15-item
    acceptance gate); maxRounds 2 keeps the continuation budget safe given the
    prior failure mode; standard strictness with autoAcceptBelow suggestion lets
    trivial nits flow through while gating real issues."
