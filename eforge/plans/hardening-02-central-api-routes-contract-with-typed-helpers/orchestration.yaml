name: hardening-02-central-api-routes-contract-with-typed-helpers
description: Introduce an API_ROUTES contract and typed per-route helpers in
  @eforge-build/client, then migrate every daemon HTTP consumer (CLI, MCP proxy,
  Pi extension, monitor UI, tests) to go through the helpers. Also removes the
  remaining @eforge-build/engine/config import from mcp-proxy.ts.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-api-routes-contract
    name: Central API_ROUTES contract and typed helper migration
    depends_on: []
    branch: hardening-02-central-api-routes-contract-with-typed-helpers/api-routes-contract
    agents:
      builder:
        effort: xhigh
        rationale: "Surface-wide type contract refactor: must harvest ~28 daemon routes
          with accurate request/response shapes, define a new helper surface,
          and migrate ten consumer files (two of them with 30+ hardcoded paths)
          in a single pass. A missed signature or response-type mismatch
          cascades into type-check failures across five packages."
      reviewer:
        effort: high
        rationale: Reviewer must cross-check every route in API_ROUTES against server.ts
          handlers and every migrated call site against the helper signature.
          High effort is warranted by breadth, not depth.
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - api-contract
        - type-safety
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: This PRD is a cross-cutting refactor that touches ~8 consumer files
    plus new client modules, but the work is a single coherent transformation
    (centralize API routes + typed helpers) that one planner session can fully
    enumerate. Dependency is linear (define routes -> define helpers -> migrate
    consumers -> drop engine import), not parallel subsystems, so excursion is
    correct rather than expedition. plan-review-cycle is included because the
    PRD has a precise acceptance contract (one helper per route, ~31 routes,
    zero stray '/api/' literals, zero engine imports in mcp-proxy) that benefits
    from a plan quality gate before build. For build, implement runs first, then
    review-cycle runs in parallel with doc-update since doc-update does not
    depend on implement's review outputs and the PRD touches public client API
    surface (README/usage docs for @eforge-build/client helpers may need
    refreshing). Review uses correctness + api-contract + type-safety
    perspectives because the risk profile is entirely about typed
    request/response contracts and route-string consistency across packages;
    maxRounds=2 is sufficient for a mechanical refactor with strong compile-time
    checks (tsc + rg audit in acceptance criteria catch most regressions).
    Standard strictness matches a feature-level refactor without security or
    data-integrity implications.
