name: hardening-02-central-api-routes-contract-with-typed-helpers
description: Introduce an API_ROUTES contract and typed per-route helpers in
  @eforge-build/client, then migrate every daemon HTTP consumer (CLI, MCP proxy,
  Pi extension, monitor UI, test) to go through the helpers. Also removes the
  remaining @eforge-build/engine/config import from mcp-proxy.ts.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-api-routes-contract
    name: Central API_ROUTES contract and typed helper migration
    depends_on: []
    branch: hardening-02-central-api-routes-contract-with-typed-helpers/api-routes-contract
    agents:
      builder:
        effort: xhigh
        rationale: "Surface-wide type contract refactor: must harvest ~28 daemon routes
          with accurate request/response shapes, define a new helper surface,
          and migrate six consumer files (two of them with 30+ hardcoded paths)
          in a single pass. A missed signature or response-type mismatch
          cascades into type-check failures across five packages."
      reviewer:
        effort: high
        rationale: Reviewer must cross-check every route in API_ROUTES against server.ts
          handlers and every migrated call site against the helper signature.
          High effort is warranted by breadth, not depth.
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - api-design
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a classic refactor that introduces a shared contract
    (API_ROUTES + typed helpers) and sweeps ~8 consumers to use it. It touches
    multiple packages but is a sequential dependency chain: define routes/types
    in client, then migrate each consumer. A single planner session can
    enumerate all ~31 routes, list every consumer file, and sequence the work -
    no independent subsystems requiring delegated module planning, so excursion
    (not expedition) is correct. plan-review-cycle is worth the cost because
    completeness matters (missing a route or consumer breaks the acceptance
    criteria's rg audit). For build: implement does the refactor, then
    review-cycle runs in parallel with doc-update since doc-update does not
    depend on review. review-cycle with maxRounds=2 and correctness + api-design
    perspectives fits a typed-contract refactor where the risk is route/type
    mismatches and helper ergonomics rather than security. Standard strictness;
    no test-write since the PRD relies on existing tests plus type-check and the
    rg audit as acceptance gates."
