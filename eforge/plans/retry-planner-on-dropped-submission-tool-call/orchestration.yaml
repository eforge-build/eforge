name: retry-planner-on-dropped-submission-tool-call
description: Convert the planner's "completed without submitting" terminal from
  a yielded plan:error event into a thrown PlannerSubmissionError, and extend
  the existing max-turns continuation loop to retry on this new error class.
  Thread the failure reason through continuationContext so the retry prompt
  tells the agent exactly why it's retrying.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-retry-dropped-submission
    name: Retry planner on dropped submission tool call
    depends_on: []
    branch: retry-planner-on-dropped-submission-tool-call/retry-dropped-submission
    build: &a1
      - implement
      - review-cycle
      - test-write
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - maintainability
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a focused excursion-scale change touching a small,
    well-defined surface: two engine files (planner.ts, pipeline.ts), the event
    type module, and the error-guard module. The PRD enumerates exact line
    ranges and describes sequential, interdependent edits (new error class ->
    thrown from planner -> caught in pipeline -> threaded into continuation
    prompt -> event type extended). That sequential coupling rules out
    expedition's parallel module planning, and the change is too multi-file and
    too logic-sensitive for errand. Compile uses planner + plan-review-cycle
    because the PRD calls out subtle correctness concerns (commitPlanArtifacts
    on empty, shared retry budget, event type shape) that benefit from a plan
    quality gate. Build runs implement, then review-cycle (this is control-flow
    and error-handling code in the core engine - regressions here break every
    pipeline), then test-write because the acceptance criteria explicitly
    require a unit test for planner.ts and an integration test for the pipeline
    continuation loop. test-write must be sequential after review-cycle since it
    declares implement as a predecessor and benefits from reviewed code. Review
    is single-strategy with correctness + maintainability perspectives at
    standard strictness and 2 rounds - appropriate for a bounded bug-fix that
    must not regress the existing max-turns retry path (AC #5). autoAcceptBelow:
    suggestion keeps the loop tight on nits while still gating warnings and
    errors."
