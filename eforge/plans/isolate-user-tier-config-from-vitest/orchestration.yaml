name: isolate-user-tier-config-from-vitest
description: Isolate user-tier eforge config from vitest by pointing
  XDG_CONFIG_HOME at an empty tmpdir via a vitest setup file, so tests (and any
  subprocess they spawn) cannot read or apply the developer's ~/.config/eforge/
  hooks, profiles, monitors, or active-profile markers.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-vitest-xdg-isolation
    name: Isolate user-tier config in vitest via XDG_CONFIG_HOME
    depends_on: []
    branch: isolate-user-tier-config-from-vitest/vitest-xdg-isolation
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This PRD is a small, well-scoped test infrastructure change touching
    ~3 files (new test/setup-test-env.ts, vitest.config.ts addition, new
    test/config-isolation.test.ts) with no production code changes. It easily
    fits a single planner session, so excursion is the right scope (not
    expedition). plan-review-cycle is included as a light quality gate since the
    PRD has explicit acceptance criteria (especially the bidirectional
    XDG_CONFIG_HOME assertions in 2a/2b) that benefit from a plan sanity check.
    For build, implement runs first, then review-cycle (correctness perspective,
    2 rounds, standard strictness) runs in parallel with test-write since the
    PRD explicitly requires a new test file (test/config-isolation.test.ts) -
    test-write's only declared predecessor is implement, which appears earlier
    as a sequential entry, so the parallel group is valid. doc-update is omitted
    because the PRD explicitly marks documentation as out of scope. test-cycle
    is omitted because the new test is the deliverable itself, not a quality
    gate around production code. Single-perspective review with standard
    strictness matches the low-risk, test-only nature of the change.
