name: fix-build-phase-crash-when-planner-generates-0-plans
description: Fix ENOENT crash when planner generates 0 plans without emitting
  skip block - strengthen prompt, add defensive engine guards, update tests
created: 2026-04-13
compiled: 2026-04-13
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-fix-zero-plans-crash
    name: Fix Build Phase Crash When Planner Generates 0 Plans
    depends_on: []
    branch: fix-build-phase-crash-when-planner-generates-0-plans/fix-zero-plans-crash
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This is a well-defined bug fix touching 5 files across 4 packages
    (engine prompts, engine agents, engine orchestrator, CLI MCP proxy, and
    tests) - clearly beyond errand scope but not expedition-scale since all
    changes serve a single cohesive fix with no independent subsystems. The
    planner compile stage is used (not prd-passthrough) because the changes span
    multiple packages with ordering dependencies - the prompt change is
    independent but the engine guards, test updates, and MCP proxy change have
    logical ordering that benefits from LLM decomposition. Plan-review-cycle is
    skipped because the PRD is exceptionally detailed with near-verbatim code
    snippets, leaving little ambiguity for the planner to misinterpret. The
    build pipeline uses implement followed by review-cycle to catch subtle edge
    cases in the defensive guards (e.g., ensuring the plan:skip event shape
    matches what downstream consumers expect, verifying the existsSync guard
    doesn't mask other failure modes). A single correctness perspective with 2
    max rounds and standard strictness is appropriate - this is a reliability
    fix, not a security or API surface change, so strict evaluation or parallel
    perspectives would be overkill. Test-write is omitted because the PRD
    explicitly specifies the test changes as part of the implementation
    (updating existing assertions, not writing new test suites).
