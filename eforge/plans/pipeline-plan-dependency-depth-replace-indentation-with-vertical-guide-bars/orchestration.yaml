name: pipeline-plan-dependency-depth-replace-indentation-with-vertical-guide-bars
description: Replace per-level 20px indentation in the monitor UI's PIPELINE
  label column with thin vertical guide bars and a depth-tinted plan pill, so
  deep plan labels (depth 3+) stop clipping inside the fixed 100px column.
base_branch: main
mode: excursion
validate:
  - pnpm --filter @eforge-build/monitor-ui type-check
  - pnpm --filter @eforge-build/monitor-ui build
plans:
  - id: plan-01-depth-guide-bars
    name: Replace depth indentation with vertical guide bars in thread-pipeline.tsx
    depends_on: []
    branch: pipeline-plan-dependency-depth-replace-indentation-with-vertical-guide-bars/depth-guide-bars
    build: &a1
      - implement
      - review-cycle
    review: &a2
      strategy: single
      perspectives:
        - ui-consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a focused, single-file UI change in
    `packages/monitor-ui/src/components/pipeline/thread-pipeline.tsx` that swaps
    padding-based depth indication for vertical guide bars and depth-tinted
    pills. The PRD is highly prescriptive (exact constants, helper, and JSX
    shape are spelled out) and touches a single component, so excursion is the
    right scope - one plan from a single planner session can enumerate all
    changes. No new APIs, no test surface called out, and no docs to sync, so
    the build is just `implement` followed by a `review-cycle` to catch any
    Tailwind class-string typos or layout regressions. A single UI-consistency
    review perspective at standard strictness with maxRounds=2 is sufficient:
    the change is cosmetic/structural with low risk, but visual correctness
    (bars span full row height, pill colors cycle correctly, 100px column
    preserved, PRD row stays yellow) deserves one focused review pass with room
    for one fix-and-re-review round."
