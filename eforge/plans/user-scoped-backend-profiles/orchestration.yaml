name: user-scoped-backend-profiles
description: Add user-scope backend profiles alongside project scope, with
  5-step resolution precedence, scope selector in MCP/Pi tools, and skill/doc
  updates.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-core-engine
    name: Core Engine, Client Types, and Daemon HTTP
    depends_on: []
    branch: user-scoped-backend-profiles/core-engine
    build: &a1
      - implement
      - - test-write
        - doc-update
      - review-cycle
    review: &a2
      strategy: auto
      perspectives:
        - correctness
        - consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
  - id: plan-02-consumers
    name: MCP Tool, Pi Extension, and Wiring Tests
    depends_on:
      - plan-01-core-engine
    branch: user-scoped-backend-profiles/consumers
    build: *a1
    review: *a2
  - id: plan-03-skills-docs
    name: Skills, Documentation, and Plugin Version Bump
    depends_on:
      - plan-01-core-engine
    branch: user-scoped-backend-profiles/skills-docs
    build: *a1
    review: *a2
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "Excursion scope: the work touches multiple packages (engine, daemon,
    MCP, Pi, skills, tests, docs) but follows a clear sequential dependency
    chain (core engine defines the primitives, then consumers wire them
    through). A single planner session can enumerate all file changes and
    resolve cross-plan dependencies without needing delegated module planning.
    Plan-review-cycle is included because the 5-step precedence logic and
    cross-scope shadowing semantics are subtle enough to warrant a quality gate
    before building. Build pipeline runs implement first, then test-write and
    doc-update in parallel (both depend only on implement, and the PRD
    explicitly requires new test cases and docs updates to config.md), followed
    by review-cycle to catch correctness issues in the precedence logic and
    consistency issues across the four consumer surfaces (daemon HTTP, MCP, Pi,
    skills). Two review rounds at standard strictness match the moderate risk
    level - the changes are additive with no breaking API changes, but the
    precedence and shadowing logic must be correct."
