name: fix-daemon-profile-routes-to-honor-user-scope-when-no-project-config-exists
description: Make /api/profile/list and /api/profile/show return user-scope data
  when no eforge/config.yaml exists, so /eforge:init can surface existing user
  profiles in fresh projects.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-user-scope-fallback
    name: Daemon profile routes fall back to user scope when no project config
    depends_on: []
    branch: fix-daemon-profile-routes-to-honor-user-scope-when-no-project-config-exists/user-scope-fallback
    build:
      - implement
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - api-design
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a focused bug fix touching two route handlers in
    packages/monitor/src/server.ts and a small helper export in
    packages/engine/src/config.ts, plus vitest coverage. It is clearly an
    excursion: multiple files but a single coherent change with no independent
    subsystems, so expedition is unwarranted, and errand is too light given the
    explicit testing requirements and the need to export new public helpers
    cleanly. Compile uses planner plus plan-review-cycle to ensure the
    helper-export shape and route-handler branching are well-specified before
    build (the PRD calls out specific behavioral matrices per scope value, which
    benefit from a quality gate). Build runs implement first, then review-cycle
    in parallel with test-write since test-write only depends on implement and
    the PRD explicitly demands new vitest cases covering four scenarios
    (user-scope listing without project config, profileShow user-marker
    resolution, scope=project empty case, unchanged project+user behavior).
    Review strategy is single with correctness and api-design perspectives (the
    latter matters because we are exporting new helpers from config.ts and need
    a minimal, coherent surface), maxRounds 2 is sufficient for a contained fix,
    and standard strictness fits a non-security bug fix."
