name: configure-eforge-for-claude-opus-4-7
description: "Configure eforge for Claude Opus 4.7: per-role effort defaults,
  split capability entries, thinking coercion from enabled to adaptive on 4.7"
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-opus-4-7-config
    name: Opus 4.7 Per-Role Effort Defaults, Capability Split, and Thinking Coercion
    depends_on: []
    branch: configure-eforge-for-claude-opus-4-7/opus-4-7-config
    agents:
      builder:
        effort: high
        rationale: Multi-file change across engine types, resolver, capabilities,
          backend, and tests - needs careful coordination to keep types
          consistent
    build: &a1
      - implement
      - review-cycle
    review: &a2
      strategy: auto
      perspectives:
        - correctness
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: >-
    Excursion scope: the changes touch ~6 files across a single subsystem (the
    engine package) with tight interdependencies - the type extension in
    backend.ts feeds into model-capabilities.ts and claude-sdk.ts, and tests
    verify all three. A single planner session can enumerate every file change
    and resolve ordering. There are no independent subsystems warranting
    expedition.


    Compile includes plan-review-cycle because the PRD has several interacting
    concerns (type extensions, runtime coercion with provenance tracking,
    per-role defaults, Zod schema documentation, and test coverage for each) - a
    review pass catches missing edge cases before build, especially around the
    coercion logic and the coordination note with peppy-sunbeam.


    Build uses implement followed by review-cycle. The coercion path (enabled →
    adaptive on 4.7) is a runtime behavioral change that benefits from iterative
    review to ensure correctness - wrong coercion silently degrades build
    quality. Test writing is not broken out as a separate stage because the PRD
    explicitly scopes test cases as part of the implementation (resolver
    defaults, capability table entries, SDK adapter coercion). Doc-update is
    omitted since no user-facing documentation or public API surface changes -
    all changes are internal engine configuration.


    Review uses a correctness perspective at standard strictness with 2 rounds.
    The work is not security-sensitive but involves type safety and runtime
    coercion logic where subtle bugs (e.g., coercing on 4.6 instead of 4.7, or
    dropping provenance) would be caught by a correctness-focused reviewer.
