name: eforge-playbooks
description: Codify recurring change shapes as named, three-tier playbooks (user
  / project-team / project-local) invokable via a handheld /eforge:playbook
  skill, CLI, and daemon HTTP. Phase 1 ships authoring + direct invocation;
  Phase 2 ships piggyback scheduling so a playbook auto-fires after a chosen
  build completes.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-engine-resolver-and-playbook-api
    name: "Engine: generalized set-artifact resolver and playbook API"
    depends_on: []
    branch: eforge-playbooks/engine-resolver
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: standard
  - id: plan-02-daemon-http-and-mcp-tool
    name: Daemon HTTP routes, client helpers, and MCP tool registration
    depends_on:
      - plan-01-engine-resolver-and-playbook-api
    branch: eforge-playbooks/daemon-and-client
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: standard
  - id: plan-03-cli-playbook-commands
    name: "CLI: eforge playbook commands and eforge play shortcut"
    depends_on:
      - plan-02-daemon-http-and-mcp-tool
    branch: eforge-playbooks/cli
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-04-skills-handheld-uis
    name: "Skills: /eforge:playbook handheld UX in Claude Code plugin and Pi
      extension"
    depends_on:
      - plan-02-daemon-http-and-mcp-tool
    branch: eforge-playbooks/skills
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-05-piggyback-and-queue-scheduling
    name: "Phase 2: piggyback scheduling and queue-list nesting"
    depends_on:
      - plan-03-cli-playbook-commands
      - plan-04-skills-handheld-uis
    branch: eforge-playbooks/piggyback
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - doc-update
      - test-write
    - review-cycle
  defaultReview:
    strategy: auto
    perspectives:
      - correctness
      - consistency
      - user-experience
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "Excursion is the right scope here despite the PRD touching multiple
    surfaces (engine resolver, CLI, daemon HTTP, two skills, queue piggyback).
    The work has a clear foundation-plus-consumers shape: the engine resolver
    registration and APIs (list/load/toSessionPlan) are the contract that the
    CLI commands, daemon routes, and the two skill implementations all consume.
    That is the textbook 'foundation layer that defines shared contracts'
    negative-signal for expedition - a single planner session can enumerate the
    foundation plan plus the consumer plans (CLI, daemon, eforge-plugin skill,
    pi-eforge skill, queue piggyback) and resolve their cross-plan dependencies.
    The Phase 1 / Phase 2 split in the PRD itself further suggests sequential
    ordering (auth/invocation first, then piggyback scheduling) rather than
    independent module delegation. Compile uses planner + plan-review-cycle
    because the PRD is large, has explicit acceptance criteria covering UX flows
    (no-args menu, scope classification decision tree, shadow notices, branch
    availability rules) and a piggyback contract that is easy to under-spec - a
    plan quality gate is worth the cost. Build pipeline runs implement first,
    then doc-update and test-write in parallel (both declare only implement as
    predecessor and touch disjoint surfaces - user-facing docs vs. test fixtures
    for the resolver/CLI/daemon), then review-cycle sequentially so reviewers
    see tests and docs alongside the implementation. doc-update is included
    because the PRD changes user-facing surfaces (new slash command, new CLI
    commands, new daemon routes, new config tier semantics, AGENTS.md
    conventions). test-write is included because the engine resolver, CLI, and
    daemon route handlers are exactly the kind of pure-logic / I/O code that
    benefits from vitest coverage (and the codebase convention is to test real
    code without mocks). review-cycle (not single review) is justified by
    acceptance criteria density and by the user-experience perspective: the
    handheld skill flow, scope classification, and shadow-notice UX have many
    easy-to-miss cases. Perspectives include user-experience because the skill
    UX (menu branches, 'lists items by name, never asks for ids', scope
    classification prompts only when ambiguous, ≥80% no-prompt rate target) is a
    first-class acceptance criterion. evaluatorStrictness is standard - this is
    feature work with developer-facing impact, not a security/data boundary that
    needs strict, and not a cosmetic change that warrants lenient. maxRounds=2
    balances iteration with cost given the scope."
