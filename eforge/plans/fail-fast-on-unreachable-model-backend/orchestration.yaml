name: fail-fast-on-unreachable-model-backend
description: "Make silent-success impossible when the model backend is
  unreachable: detect SDK error stopReason and zero-token backstop in pi
  backend; fail-closed PRD validator; orchestrator must not swallow validator
  errors."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-fail-fast-backend
    name: Fail-fast on unreachable model backend
    depends_on: []
    branch: fail-fast-on-unreachable-model-backend/fail-fast-backend
    build: &a1
      - implement
      - - review-cycle
        - test-write
      - test-cycle
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - error-handling
        - reliability
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: strict
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a classic excursion: a focused reliability bug fix
    touching 3 specific files (pi.ts, prd-validator.ts, phases.ts) with clearly
    defined changes. It's not trivial enough for errand (multiple files, subtle
    error-handling semantics, testing requirements) and nowhere near expedition
    scale (no independent subsystems). Compile uses planner + plan-review-cycle
    because the PRD specifies precise line-level edits and a plan-review gate
    helps catch scope drift. Build uses implement followed by review-cycle and
    test-write in parallel (the PRD explicitly requires a unit-style repro test
    for the SDK error shape), then test-cycle to actually run tests and validate
    the fixes don't regress. Review strictness is 'strict' with an
    'error-handling' and 'reliability' perspective because the entire bug is
    about error-handling semantics (fail-fast on unreachable backend, no silent
    success) - getting the error paths wrong would directly re-introduce the
    bug. maxRounds=2 is sufficient for a bounded bug fix. The 'correctness'
    perspective ensures the zero-token backstop doesn't false-positive on
    legitimate tool-result-only turns (explicit acceptance criterion #4)."
