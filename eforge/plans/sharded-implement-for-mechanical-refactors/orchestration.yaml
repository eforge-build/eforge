name: sharded-implement-for-mechanical-refactors
description: Allow the `implement` stage to fan out into N parallel builder
  invocations within the same worktree, partitioned by planner-declared shard
  scopes, for large mechanical refactors. Engine-level coordinator handles
  verification, scope enforcement, and a single coordinator commit. Per-shard
  retry uses stash-based checkpointing. Harness equality preserved.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-sharded-implement
    name: Sharded implement stage with stash-based per-shard retry
    depends_on: []
    branch: sharded-implement-for-mechanical-refactors/sharded-implement
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: parallel
      perspectives:
        - code
        - api
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: xhigh
        rationale: Large refactor introducing parallelism into the implement stage with
          coordinator phase, stash-based checkpoint mechanism, and scope
          enforcement — touches builder agent, build-stages pipeline, retry
          policy, and config schema together. High coordination complexity
          across files.
      reviewer:
        effort: high
        rationale: Concurrency + git state machine (stash push/pop, staged/unstaged
          transitions, scope enforcement) needs careful review for race
          conditions, ordering bugs, and missed edge cases.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
    - test-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - correctness
      - concurrency
      - api-design
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: strict
  rationale: "This PRD modifies the engine's core pipeline internals (config
    schema, implement stage, builder agent, retry mechanism, planner prompt) - a
    coordinated set of changes touching 6 known files in a single subsystem
    (packages/engine). A single planner session can readily enumerate all plans
    and resolve dependencies (config schema -> builder shard mode -> implement
    stage fan-out -> scope enforcement -> retry stash mechanism -> planner
    prompt), so excursion is the right scope rather than expedition. The changes
    form a sequential dependency chain (schema underpins builder, builder
    underpins implement stage, etc.) - a classic negative signal for expedition.
    Compile uses planner + plan-review-cycle because plan quality matters here:
    shard scope semantics, commit-shape invariants, and retry/stash semantics
    must be planned correctly or the build will silently break the 'one commit
    per plan' invariant. Build pipeline runs implement first, then review-cycle
    in parallel with doc-update (doc-update has no predecessor conflict with
    review-cycle), then test-cycle since the PRD's Acceptance Criteria
    explicitly enumerate 6 end-to-end test scenarios (identity, sharded Claude
    SDK, sharded Pi, scope-violation, per-shard retry, small-refactor heuristic)
    that warrant iterative test-fix loops. Review uses parallel strategy with
    correctness, concurrency (shards run via runParallel - race conditions on
    shared worktree/index are a real risk), and api-design (config schema and
    BuilderOptions are public-ish surfaces) perspectives. Strict evaluator and 2
    rounds because this touches retry/commit semantics where regressions are
    subtle and hard to recover from."
