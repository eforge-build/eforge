name: fix-recovery-sidecar-generation-inline-atomic-commit
description: Collapse recovery architecture so the move-to-failed and both
  sidecar files are produced atomically in one commit by the queue parent's
  finalize handler, deleting the daemon's recovery polling loop and making
  EforgeEngine.recover() resilient when state.json is gone.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-inline-atomic-recovery
    name: Inline atomic recovery sidecar + resilient recover()
    depends_on: []
    branch: fix-recovery-sidecar-generation-inline-atomic-commit/main
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: Coordinated changes across engine + monitor + tests with sidecar
          schema migration (v1 -> v2), atomic-commit semantics, and a
          partial-summary fallback path that has to keep working when
          state.json, the event db, and the feature branch may all be missing or
          partially absent.
      reviewer:
        effort: high
        rationale: "Failure path correctness matters: a regression here silently loses
          recovery sidecars on production failures. Reviewer must verify the
          failure-summary fallback chain, the single-commit assertion, and that
          the daemon polling loop is fully excised (no orphan callers of
          getNewBuildFailedEvents / failedPrdDir / inFlightRecoveries)."
      tester:
        effort: high
        rationale: Rewritten test file covers 5 distinct scenarios (atomic commit,
          multi-plan PRD bug, agent error fallback, partial-summary path, manual
          recover). The tester needs to validate against the spec rather than
          against a stale auto-trigger contract that this plan removes.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - test-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - architecture
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: strict
  rationale: "This is a focused bug-fix-and-refactor PRD touching ~10 files across
    two packages (engine + monitor) with sequential, tightly-coupled
    dependencies: stop deleting state.json -> inline recovery in finalize -> new
    prd-queue helper -> schema bump -> resilient recover() -> delete daemon
    polling loop. A single planner can enumerate every file change and the
    cross-file ordering in one session, so excursion (not expedition) is correct
    - there are no 4+ independent subsystems and the changes form a dependency
    chain rather than parallel modules. plan-review-cycle is added because the
    PRD has subtle correctness requirements (atomic single-commit semantics,
    schema v1->v2 compatibility, multi-plan PRD vs planId disambiguation,
    deletion of an entire daemon loop) where a plan-quality gate before build
    pays off. defaultBuild keeps implement strictly first (review-cycle and
    test-cycle both declare implement as a predecessor and conflict with their
    inner stages, so they must be sequential after implement). test-cycle is
    included because the PRD's Acceptance Criteria explicitly mandates a
    rewritten test/daemon-recovery.test.ts with five concrete test cases (atomic
    commit assertion, multi-plan scenario, agent-error fallback, partial-summary
    manual recover, etc.) - test execution and production-issue detection is
    squarely in scope. doc-update is omitted because the PRD explicitly notes
    CHANGELOG is owned by the release flow and there are no user-facing
    docs/APIs to update (HTTP routes and MCP tools are retained unchanged; only
    internals shift). Review uses single strategy with correctness +
    architecture perspectives at strict evaluator strictness because the change
    touches commit semantics, git history shape, and a schema bump - all areas
    where a regression is high-cost and recovery is the very feature being
    fixed. maxRounds=2 balances thoroughness against the bounded scope."
