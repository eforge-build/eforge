name: per-command-timeout-for-post-merge-validate-phase
description: Bound every post-merge validate-phase command with a configurable
  wall-clock timeout that kills the full subprocess tree on expiry, surfaces a
  distinct timeout event, and feeds the existing validation-fixer loop.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-validate-command-timeout
    name: Per-command timeout for post-merge validate phase
    depends_on: []
    branch: per-command-timeout-for-post-merge-validate-phase/validate-command-timeout
    build: &a1
      - implement
      - - review-cycle
        - doc-update
      - test-write
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - reliability
        - cross-platform
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a focused, multi-file feature touching the engine (exec
    helper, phases orchestrator, events union, config schema), the monitor UI
    (reducer + failure banner), and docs - clearly an excursion. It is not
    expedition-scale: there is a sequential dependency chain (config schema ->
    exec helper -> validate() wiring -> event emission -> UI rendering) that a
    single planner can enumerate in one session, and the shared types
    (EforgeEvent union, config type) would break consumers if split across
    independent module planners. A foundation-plus-verticals pattern exists
    (exec helper foundation, then phases/UI/docs) but does not justify delegated
    module planning. Compile uses planner + plan-review-cycle because
    subprocess-tree kill semantics, signal handling grace periods, and the
    cross-platform fallback are easy to under-spec - a plan review pass catches
    scope gaps (e.g., forgetting the config:warning clamp event, the phase
    summary field, or the Windows path) before build. Build runs implement
    first, then review-cycle in parallel with doc-update (doc-update has no
    predecessor on review and the docs/config.md update is independent of code
    review feedback), followed by test-write to author the unit test for
    execWithTimeout and the integration test for validate() that the acceptance
    criteria explicitly require. Review uses single strategy with
    correctness/reliability/cross-platform perspectives - reliability matters
    because we're dealing with signals, process groups, timers, and grace
    periods where leaks or race conditions are easy; cross-platform matters
    because the PRD calls out POSIX vs Windows kill semantics. maxRounds 2 with
    standard strictness fits a medium-risk engine change that isn't
    security-critical."
