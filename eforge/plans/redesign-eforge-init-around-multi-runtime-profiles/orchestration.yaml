name: redesign-eforge-init-around-multi-runtime-profiles
description: "Redesign /eforge:init around multi-runtime profiles: skill drives
  all elicitation, eforge_init becomes a pure persister, users pick quick
  (single-harness) or mix-and-match (per-tier) setup, and the engine helper
  accepts richer multi-runtime input."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-foundation
    name: Generalize createAgentRuntimeProfile, daemon route, API version
    depends_on: []
    branch: redesign-eforge-init-around-multi-runtime-profiles/foundation
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: plan-02-consumers
    name: Rewrite init skill and tool API around multi-runtime profile input
    depends_on:
      - plan-01-foundation
    branch: redesign-eforge-init-around-multi-runtime-profiles/consumers
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
    - test-cycle
  defaultReview:
    strategy: parallel
    perspectives:
      - correctness
      - api-design
      - consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a coordinated refactor across multiple packages
    (eforge-plugin skill, MCP proxy, pi-eforge extension and skill, engine
    config helper, daemon route, client api-version, plugin manifest) with clear
    sequential dependencies: the engine helper (`createAgentRuntimeProfile`
    generalization + `deriveProfileName`) is the foundation, then MCP proxy + Pi
    extension consume it, then skills/daemon route are updated, then version
    bumps and tests. A single planner session can comfortably enumerate these
    plans and their file-level changes, so this is excursion, not expedition -
    the foundation-plus-consumers pattern here fits the excursion heuristic.
    plan-review-cycle is added because the PRD has a precise contract (new
    `profile` schema shape, validation rules, name-derivation branches, two
    skill flows kept in sync) where a plan quality gate prevents drift between
    Claude Code and Pi consumers (an explicit AGENTS.md requirement). For build:
    implement is sequential, then review-cycle runs in parallel with doc-update
    (doc-update only depends on implement, so it is safe alongside
    review-cycle), then test-cycle gates on production correctness because the
    PRD lists explicit unit/integration test cases (quick-path, mix-path,
    name-derivation, multi-runtime round-trip) and acceptance criteria require
    `pnpm test` and `pnpm type-check` to pass. Review uses parallel perspectives
    (correctness for validation logic and tier/runtime wiring, api-design for
    the new `profile` schema and `DAEMON_API_VERSION` bump, consistency for
    keeping eforge-plugin and pi-eforge in sync) at standard strictness with 2
    rounds - this is a developer-tooling refactor, not security/data critical,
    but the cross-package sync requirement makes parallel perspectives
    worthwhile."
