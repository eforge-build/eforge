name: add-session-scoped-model-registry-to-append-models-used-trailer-to-eforge-commits
description: Add a session-scoped ModelTracker that accumulates unique model IDs
  from agent:start events and appends a Models-Used trailer (before the existing
  Co-Authored-By attribution) to eforge commits, so commits carry provenance of
  which models produced the work.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-model-tracker-trailer
    name: ModelTracker and Models-Used commit trailer
    depends_on: []
    branch: add-session-scoped-model-registry-to-append-models-used-trailer-to-eforge-commits/model-tracker-trailer
    agents:
      builder:
        effort: high
        rationale: Threads a new accumulator through several tightly coupled context
          types (PhaseContext, PipelineContext, mergePlan signature) and
          multiple commit sites; requires careful coordination across ~14 files
          in a single atomic change.
      reviewer:
        effort: high
        rationale: Must verify trailer ordering (before ATTRIBUTION), per-plan vs shared
          tracker isolation, event subscription correctness, and that
          reuseMessage conflict-resolution path preserves existing trailer
          without duplication.
    build: &a1
      - implement
      - - review-cycle
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - consistency
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This PRD is a classic excursion: a multi-file feature that threads a
    new passive accumulator (ModelTracker) through existing engine context
    objects (PhaseContext, PipelineContext, WorktreeManager.mergePlan,
    commitPlanArtifacts, runBuildPipeline). The PRD itself self-identifies as
    'Excursion' in its Profile Signal. It touches several subsystems
    (orchestrator, worktree manager, pipeline, git helpers) but there is a
    sequential dependency chain - the ModelTracker class must exist before it
    can be threaded through contexts, and signature changes cascade to tests -
    which is a negative expedition signal. A single planner can enumerate all
    plans and file changes in one session. Compile uses planner +
    plan-review-cycle because signature threading across many files benefits
    from a plan quality gate to catch missed call sites before build. The build
    pipeline runs implement first, then review-cycle in parallel with doc-update
    (AGENTS.md and git.ts header updates are explicitly called out in acceptance
    criteria 18-19, and doc-update does not depend on review). Review uses a
    single strategy with correctness (all 23 acceptance criteria must be met,
    trailer ordering and sort determinism matter) and consistency (engine
    convention compliance - forgeCommit usage, no raw git commits, passive
    accumulator discipline) perspectives, 2 rounds, standard strictness -
    appropriate for engine-core changes that are mechanical but wide-reaching,
    without being security-sensitive."
