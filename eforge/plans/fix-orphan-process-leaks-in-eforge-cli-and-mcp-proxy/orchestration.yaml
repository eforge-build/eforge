name: fix-orphan-process-leaks-in-eforge-cli-and-mcp-proxy
description: Wire SIGHUP/uncaughtException/unhandledRejection handlers in the
  eforge CLI to close the monitor DB on abnormal termination, and add stdin
  close/end detection in the MCP proxy so it exits when Claude Code goes away.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-exit-handlers
    name: CLI and MCP proxy exit handlers
    depends_on: []
    branch: fix-orphan-process-leaks-in-eforge-cli-and-mcp-proxy/exit-handlers
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: single
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - reliability
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a focused bug fix touching three CLI/proxy entry points
    (packages/eforge/src/cli/index.ts, packages/eforge/src/cli/mcp-proxy.ts)
    plus tests for the new exit paths. It's clearly more than a trivial errand
    (multiple files, signal-handler wiring, lifecycle correctness with real risk
    of double-close or hangs on shutdown), but a single planner session can
    easily enumerate every change and dependency - so excursion, not expedition.
    Compile uses planner + plan-review-cycle to catch any scope drift around
    shutdown semantics before build. Build runs implement first, then
    review-cycle in parallel with test-write since the PRD explicitly calls for
    tests covering SIGTERM and stdin-close paths (test-write does not declare
    review-cycle as a predecessor, so the parallel group is valid). Review uses
    a single-strategy correctness/reliability pass with standard strictness and
    2 rounds: this is process-lifecycle code where edge cases (double
    monitor.stop, signal handlers swallowing exits, leaked handles) matter, but
    it's not security/data-sensitive enough to warrant strict mode or parallel
    perspectives. Doc-update is omitted because the PRD changes internal exit
    handling without altering public APIs or user-facing docs."
