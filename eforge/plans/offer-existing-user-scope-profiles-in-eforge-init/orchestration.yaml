name: offer-existing-user-scope-profiles-in-eforge-init
description: Add a new step to /eforge:init that offers existing user-scope
  profiles for activation, with a matching `existingProfile` field on the
  `eforge_init` MCP tool that skips profile assembly while still writing
  project-scope postMergeCommands.
base_branch: main
mode: excursion
validate:
  - pnpm build
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-existing-profile-init
    name: Offer existing user-scope profiles in /eforge:init
    depends_on: []
    branch: offer-existing-user-scope-profiles-in-eforge-init/plan-01-existing-profile-init
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - - review-cycle
      - doc-update
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - consistency
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This PRD is a coordinated change across two skill files plus a small
    MCP/daemon surface extension (likely extending eforge_init to accept an
    existingProfile field). It touches multiple files with sequential
    dependencies (skills depend on the eforge_init extension being in place), so
    it's clearly excursion - not a single-file errand, but also not 4+
    independent subsystems requiring delegated module planning. A single planner
    session can comfortably enumerate all plans (skill updates in lockstep,
    eforge_init extension, plugin version bump) and resolve their ordering.
    plan-review-cycle is included because the PRD explicitly calls out keeping
    both skill files coherent and choosing the smallest reasonable MCP entry
    point - a plan quality gate catches scope drift here. For build, implement
    is followed by review-cycle (correctness + consistency perspectives are
    critical since two skill files must stay in lockstep) running in parallel
    with doc-update (the PRD modifies user-facing skill behavior and bumps
    plugin version, so docs/changelog-adjacent surfaces may need touch-ups;
    doc-update declares only implement as a predecessor so it parallelizes
    safely with review-cycle). Review strictness is standard - this is a UX/flow
    change, not security or data handling. maxRounds=2 is sufficient for a
    focused two-skill-file + small MCP change.
