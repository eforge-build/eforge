name: move-pi-provider-from-model-refs-to-agentruntime-config
description: "Move Pi `provider` from per-model refs
  (`agents.models.<class>.provider`) to the agentRuntime entry
  (`agentRuntimes.<name>.pi.provider`). Hard removal of `provider` from
  `modelRefSchema`; required for `harness: pi` runtimes via schema-time
  `superRefine`. Resolver splices `provider` from runtime config into the
  resolved model ref so Pi harness contract is preserved on the wire. No
  backcompat shim. Eval profile migration is captured in a separate follow-on
  PRD and is out of scope."
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-schema-resolver-tests
    name: Schema, resolver, and inline test fixtures
    depends_on: []
    branch: move-pi-provider-from-model-refs-to-agentruntime-config/schema-resolver-tests
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 2
      evaluatorStrictness: standard
  - id: plan-02-skill-docs-and-plugin-bump
    name: Skill doc updates and plugin version bump
    depends_on:
      - plan-01-schema-resolver-tests
    branch: move-pi-provider-from-model-refs-to-agentruntime-config/skill-docs-and-plugin-bump
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - docs
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - - doc-update
      - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - schema-design
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This PRD is a focused schema/resolver refactor touching a
    well-bounded set of files in one repo (config.ts, agent-config.ts, plugin
    skill docs, and a handful of test files). It is sequential by nature (schema
    change forces resolver change forces test fixture updates) and has no
    independent subsystems, so excursion is correct - expedition would add
    overhead with no parallel module planning benefit. plan-review-cycle is
    included because the PRD has subtle cross-cutting concerns (schema-time vs
    resolve-time validation, splicing provider into resolved model refs,
    breakage window for eval profiles) where catching scope/quality issues
    before build pays off. Build-phase: implement first, then review-cycle for
    the type-safety and validation correctness that matters here, with
    doc-update and test-write running in parallel afterward (skill docs are
    explicitly in scope per the PRD, and test fixtures need updating).
    review-cycle uses standard strictness with maxRounds=2 - the change is
    mechanical enough that exhaustive iteration is unnecessary, but a
    correctness/schema-design perspective is warranted because Zod schema
    cross-validation and resolver round-tripping are the primary risk surface."
