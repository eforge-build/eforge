name: fix-plan-build-failure-silently-marked-as-completed
description: Fix bug where a plan that emits build:failed is still marked as
  completed, allowing broken merges and unblocking dependents that should be
  blocked.
base_branch: main
mode: errand
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-detect-build-failed
    name: Detect build:failed in launchPlan and propagate failure
    depends_on: []
    branch: fix-plan-build-failure-silently-marked-as-completed/detect-build-failed
    build: &a1
      - implement
      - review-cycle
    review: &a2
      strategy: auto
      perspectives:
        - correctness
      maxRounds: 1
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a focused bug fix in the orchestrator's plan-completion
    logic - one production file change plus a new test case. Excursion scope is
    appropriate: while the change is small and precisely specified, it touches
    critical orchestration logic (plan state transitions, failure propagation,
    merge gating) where a correctness review adds genuine value. Errand was
    considered but the orchestrator is the reliability backbone of the engine,
    making a single review round worthwhile. No plan-review-cycle is needed
    since the PRD fully specifies the approach and exact code change. The test
    is integral to the implementation (the PRD describes exactly what to
    assert), so a separate test-write stage would be redundant - the builder
    will write tests as part of the implementation. No doc-update is needed
    since this is an internal bug fix with no API or user-facing documentation
    impact. One review round with a correctness perspective and standard
    strictness catches edge cases (e.g., event ordering, state persistence
    timing) without over-investing in review for a well-scoped fix."
