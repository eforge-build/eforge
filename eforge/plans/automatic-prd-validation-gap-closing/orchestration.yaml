name: automatic-prd-validation-gap-closing
description: Add automatic gap-closing attempt before failing PRD validation,
  with re-validation after fixes
created: 2026-04-01
compiled: 2026-04-01
mode: excursion
base_branch: main
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-gap-closer
    name: Automatic PRD Validation Gap Closing
    depends_on: []
    branch: automatic-prd-validation-gap-closing/gap-closer
    build:
      - - implement
        - doc-update
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
    - test-write
  defaultReview:
    strategy: single
    perspectives:
      - correctness
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is an excursion-scope feature: it touches ~8 files across
    agents, events, orchestrator, phases, CLI, and monitor UI, but they all
    serve a single coherent feature (gap closing). The PRD is extremely
    well-specified with exact file locations and patterns to follow, reducing
    planning risk. Plan review cycle is included because the changes span
    multiple subsystems (orchestrator sequencing, phase logic, new agent,
    events, display) and getting the orchestrator re-validation sequencing right
    is critical. Review focuses on correctness since the orchestrator flow
    changes (re-running validate after gap close, the gapClosePerformed guard)
    are the highest-risk area - an incorrect sequence could cause infinite loops
    or skipped validation. Two review rounds give enough room to catch
    sequencing and event-handling exhaustiveness issues. Test-write is included
    since the PRD explicitly requires a unit test following the validation-fixer
    pattern. Standard strictness is appropriate - this is internal engine logic,
    not security-sensitive."
