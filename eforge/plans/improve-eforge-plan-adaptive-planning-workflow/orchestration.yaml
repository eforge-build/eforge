name: improve-eforge-plan-adaptive-planning-workflow
description: Replace the fixed six-dimension /eforge:plan workflow with an
  adaptive, work-type-aware planning strategy and update /eforge:build readiness
  warnings to understand the new metadata.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
plans:
  - id: plan-01-adaptive-planning-skills
    name: Adaptive /eforge:plan workflow and /eforge:build readiness updates
    depends_on: []
    branch: improve-eforge-plan-adaptive-planning-workflow/adaptive-planning-skills
    build:
      - implement
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
        - docs
      maxRounds: 2
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - doc-update
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - consistency
      - documentation
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: This PRD is a skill/documentation revision across two consumer-facing
    packages (Pi extension and Claude Code plugin) plus a plugin version bump.
    The PRD itself recommends the `excursion` profile and explicitly calls out
    that no engine, daemon, or MCP changes are needed. There are no independent
    subsystems requiring delegated module planning, but the work spans paired
    files that must remain semantically in sync (plan + build skills across Pi
    and Claude Code), so a plan-review-cycle is valuable to catch drift and
    ensure adaptive playbooks, frontmatter shape, and readiness rules are
    coherent before build. Build pipeline runs `implement` first, then
    `doc-update` (which requires implement as a predecessor, so it must be
    sequential), followed by a review-cycle focused on consistency (Pi vs plugin
    parity, old/new frontmatter compatibility) and documentation quality. No
    automated tests are needed since this is pure prompt/instruction content.
    Standard strictness with 2 rounds is appropriate for documentation-grade
    work where correctness is judged by clarity and parity rather than
    executable behavior.
