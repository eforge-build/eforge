name: hardening-01-consolidate-shared-types-and-constants-into-eforge-build-client
description: Consolidate ReviewProfileConfig (including autoAcceptBelow),
  BuildStageSpec, and lockfile polling constants into @eforge-build/client as
  the single owner. Delete duplicate declarations in monitor, monitor-ui,
  engine, mcp-proxy, and pi-eforge. Document the EforgeEvent ->
  DaemonStreamEvent mapping.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-consolidate-shared-types
    name: Consolidate shared types and constants into @eforge-build/client
    depends_on: []
    branch: hardening-01-consolidate-shared-types-and-constants-into-eforge-build-client/consolidate
    build: &a1
      - implement
      - review-cycle
      - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - api-design
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: "This is a pure consolidation/refactor that touches multiple packages
    (client, engine, monitor, monitor-ui, eforge, pi-eforge) but is a cohesive
    type-and-constant unification - exactly the kind of 'change a definition,
    update all consumers' refactor that the guidelines flag as excursion, not
    expedition. A single planner can enumerate every file change across the 6-7
    affected files. Plan-review-cycle is included because cross-package type
    refactors are easy to miss import sites, and catching scope gaps pre-build
    is cheap. Build pipeline: implement produces the changes, review-cycle
    iterates on correctness (import paths, re-exports, Zod schema alignment,
    `autoAcceptBelow` end-to-end preservation), and doc-update runs in sequence
    after (not parallel) because the PRD explicitly requires JSDoc headers and
    in-file banners that are part of the implementation rather than separate
    docs work - but doc-update catches any README/AGENTS.md drift. Review
    perspectives focus on correctness (type-check must pass, single-hit ripgrep
    criteria) and api-design (the client package's public surface is being
    expanded). Standard strictness and maxRounds of 2 fit a mechanical refactor
    with clear acceptance criteria."
