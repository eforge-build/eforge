name: hardening-06-unified-retry-policy-for-pipeline-agents
description: Refactor ad-hoc retry/continuation logic in the pipeline into a
  unified RetryPolicy + withRetry wrapper with a per-agent policy registry.
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm test
  - pnpm build
plans:
  - id: plan-01-unified-retry-policy
    name: Unified retry policy for pipeline agents
    depends_on: []
    branch: hardening-06-unified-retry-policy-for-pipeline-agents/unified-retry-policy
    agents:
      builder:
        effort: xhigh
        rationale: Cross-cutting refactor touching pipeline.ts, three agent files,
          events, and tests; preserving existing semantics (checkpointing,
          dropped-submission vs max_turns branching, evaluator unstaged-changes
          short-circuit) while deleting three separate retry loops requires
          careful coordination.
      reviewer:
        effort: high
        rationale: Refactor must preserve behavior exactly — reviewer needs to verify no
          retry branch, event, or checkpoint was lost in the migration.
    build: &a1
      - implement
      - review-cycle
      - - test-write
        - doc-update
    review: &a2
      strategy: single
      perspectives:
        - correctness
        - maintainability
      maxRounds: 2
      autoAcceptBelow: suggestion
      evaluatorStrictness: standard
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild: *a1
  defaultReview: *a2
  rationale: This is a focused refactor within a single package (packages/engine)
    that introduces a new retry abstraction and migrates existing ad-hoc retry
    branches to use it. The PRD explicitly marks scope as excursion and lists a
    bounded set of files (retry.ts, events.ts, pipeline.ts, three agent files,
    tests). A single planner session can enumerate all plan pieces and
    cross-file dependencies, so excursion is correct rather than expedition.
    Compile uses planner plus plan-review-cycle because the refactor touches a
    core pipeline abstraction and getting the RetryPolicy shape and call-site
    migration right up front matters. Build runs implement, then review-cycle
    for quality (the change is pipeline-critical and must not regress existing
    retry behavior), with test-write and doc-update in parallel after review
    since the PRD requires new unit and integration tests (retry.test.ts,
    agent-wiring.test.ts extension) and touches an engine contract consumers may
    care about. Review uses correctness and maintainability perspectives with
    standard strictness - correctness because retry semantics are easy to get
    subtly wrong, maintainability because the whole point is a cleaner unified
    pattern. Two rounds is sufficient for a bounded refactor.
