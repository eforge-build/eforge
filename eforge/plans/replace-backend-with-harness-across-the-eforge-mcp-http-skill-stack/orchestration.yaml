name: replace-backend-with-harness-across-the-eforge-mcp-http-skill-stack
description: 'Rename "backend" to "harness" across the public surface (MCP
  tools, daemon HTTP API, client types, engine helpers, skills) so the entire
  stack uses the term that matches the agentRuntimes schema and the
  mixed-harness reality of agent runtime profiles. Breaking change: bump
  DAEMON_API_VERSION from 9 to 10.'
base_branch: main
mode: excursion
validate:
  - pnpm type-check
  - pnpm build
  - pnpm test
plans:
  - id: plan-01-rename-backend-to-harness
    name: Rename backend → harness across MCP, HTTP, client types, engine helpers,
      and skills
    depends_on: []
    branch: replace-backend-with-harness-across-the-eforge-mcp-http-skill-stack/plan-01-rename-backend-to-harness
    build:
      - implement
      - test-cycle
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
    agents:
      builder:
        effort: high
        rationale: "Cross-package coordinated rename touching ~18 files. Mechanical but
          unforgiving: a missed callsite breaks pnpm type-check. Sharded across
          three parallel scope groups (types/engine, MCP tools, skills+tests) so
          each shard has tight focus while the merged result must compile
          coherently."
        shards:
          - id: shard-types-engine-monitor
            roots:
              - packages/client/
            files:
              - packages/engine/src/config.ts
              - packages/monitor/src/server.ts
          - id: shard-mcp
            files:
              - packages/eforge/src/cli/mcp-proxy.ts
              - packages/pi-eforge/extensions/eforge/index.ts
          - id: shard-skills-tests
            roots:
              - eforge-plugin/skills/
              - packages/pi-eforge/skills/
            files:
              - test/config-backend-profile.test.ts
      reviewer:
        effort: high
        rationale: Reviewer must catch any missed callsite or stale 'backend' reference
          outside the legitimate-leftover allowlist (legacy YAML field, plan
          codename comment, parseRawConfigLegacy). Acceptance criterion 8
          mandates a clean grep audit.
pipeline:
  scope: excursion
  compile:
    - planner
    - plan-review-cycle
  defaultBuild:
    - implement
    - review-cycle
  defaultReview:
    strategy: single
    perspectives:
      - correctness
      - consistency
      - api-contract
    maxRounds: 2
    autoAcceptBelow: suggestion
    evaluatorStrictness: standard
  rationale: "This is a coordinated rename refactor (`backend` -> `harness`) that
    ripples through TypeScript types, MCP tool params, daemon HTTP API, client
    types, engine helpers, and skill markdown across multiple packages. Per the
    user's feedback memory, type/interface refactors and
    rename-and-update-all-callers refactors are negative signals for expedition
    - the TypeScript compiler is the safety net and changes are tightly coupled,
    so a single planner session can enumerate every file/line listed in the PRD.
    Excursion is the right scope. Compile uses `planner` + `plan-review-cycle`
    because the PRD spans 5 distinct surfaces (engine helpers, daemon API +
    version bump, client types, MCP tools for both Plugin and Pi, four skill
    files) and plan quality matters for catching missed call sites and
    preserving the legitimate legacy `backend:` YAML references that must NOT be
    renamed. Build uses sequential `implement` -> `review-cycle` (no parallelism
    needed; review must read the final implemented state to verify the grep
    audit acceptance criterion). `doc-update` is omitted because the skill
    markdown updates are themselves part of the implementation scope.
    `test-cycle` is omitted because acceptance criteria #2 only requires
    updating existing fixtures (a `pnpm test` pass), not authoring new tests;
    the TypeScript build (criterion #1) is the primary safety net. Review uses
    `single` strategy with three perspectives (`correctness` for the rename
    mechanics, `consistency` for Plugin/Pi parity, `api-contract` for the
    DAEMON_API_VERSION bump and breaking field renames). `standard` strictness
    fits a non-security refactor; `maxRounds: 2` is sufficient given the rename
    is mechanical and the PRD enumerates exact line numbers."
