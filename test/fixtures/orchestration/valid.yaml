name: test-orchestration
description: A test orchestration config
created: "2026-01-01"
mode: excursion
base_branch: main
profile:
  description: Multi-file feature work or refactors that need planning and review but fit in a single plan.
  compile:
    - planner
    - plan-review-cycle
plans:
  - id: core
    name: Core Module
    branch: feature/core
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
  - id: cli
    name: CLI Module
    branch: feature/cli
    depends_on:
      - core
    build:
      - - implement
        - doc-update
      - review-cycle
    review:
      strategy: auto
      perspectives:
        - code
      maxRounds: 1
      evaluatorStrictness: standard
